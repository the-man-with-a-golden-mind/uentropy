<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>entropy – Async Computed</title>
  <style>
    body { font-family: sans-serif; max-width: 520px; margin: 4rem auto; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-top: 1rem; }
    .badge { display: inline-block; padding: .2rem .6rem; border-radius: 4px;
             font-size: .8rem; color: #fff; font-weight: bold; }
    select { padding: .4rem .8rem; font-size: 1rem; cursor: pointer; }
    .spinner { opacity: .5; font-style: italic; }
    #build-error { font-family: sans-serif; padding: 2rem; }
    #build-error code { background: #f3f4f6; padding: .2rem .4rem; border-radius: 4px; }
  </style>
</head>
<body>
  <!-- Requires: npm run build  (generates dist/entropy.min.js) -->

  <h1>Async Post Viewer</h1>
  <p>Demonstrates async computed values and a custom <code>en-badge</code> directive.</p>

  <div style="display:flex; gap:.5rem; align-items:center; margin:1rem 0">
    <label>Post ID:</label>
    <select onchange="data.postId = +this.value">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
    </select>
  </div>

  <template en-if="loading">
    <p class="spinner">Loading…</p>
  </template>

  <template en-ifnot="loading">
    <div class="card">
      <h2 en-mark="post.title"></h2>
      <p en-mark="post.body"></p>
      <span class="badge" en-badge="post.userId:royalblue">user</span>
    </div>
  </template>

  <script src="https://unpkg.com/uentropy/dist/entropy.min.js" onerror="
    document.body.innerHTML = '<div id=build-error><h2>⚠️ Build required</h2><p>Run <code>npm run build</code> in the project root, then reload.</p></div>';
  "></script>
  <script>
    const en = UEntropy.default;

    // Custom parametric directive: en-badge="key:color"
    en.directive('badge', ({ el, value, param }) => {
      el.style.backgroundColor = param ?? '#888';
      el.textContent = 'User #' + value;
    }, true);

    window.data  = en.init();
    data.postId  = 1;
    data.loading = false;

    data.post = en.computed(async () => {
      data.loading = true;
      try {
        const res = await fetch('https://jsonplaceholder.typicode.com/posts/' + data.postId);
        return await res.json();
      } finally {
        data.loading = false;
      }
    });
  </script>
</body>
</html>
